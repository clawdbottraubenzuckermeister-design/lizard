<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lizard Keyboard 🦎</title>
    <style>
        :root {
            --neon-green: #39ff14;
            --dark-bg: #121212;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        /* Der springende Mini-Lizard */
        #jumping-lizard {
            position: absolute;
            font-size: 2rem;
            z-index: 100;
            transition: all 0.1s ease-out;
            pointer-events: none;
            display: none; /* Erst beim ersten Tastendruck sichtbar */
        }

        .header { text-align: center; margin-top: 20px; }
        h1 { color: var(--neon-green); margin: 0; font-size: 1.5rem; text-transform: uppercase; }

        /* Tastatur Layout */
        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: #222;
            border-radius: 10px;
            border: 2px solid #333;
        }

        .row { display: flex; justify-content: center; gap: 5px; }

        .key {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            border-bottom: 3px solid #111;
            transition: transform 0.05s;
        }

        .key.active {
            background: var(--neon-green);
            color: black;
            transform: translateY(2px);
            border-bottom: 0px;
        }

        /* Mobile Button */
        #mobile-button {
            width: 80%;
            max-width: 300px;
            height: 100px;
            background: var(--neon-green);
            color: black;
            border: none;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 10px 0 #28b80d;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        #mobile-button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #28b80d;
        }

        .big-lizard { font-size: 3rem; }
    </style>
</head>
<body>

    <div id="jumping-lizard">🦎</div>

    <div class="header">
        <h1>Lizard Keyboard</h1>
        <p style="font-size: 0.8rem; opacity: 0.6;">Klick einmal, um den Sound zu aktivieren!</p>
    </div>

    <div class="keyboard" id="visual-keyboard">
        <div class="row" id="row-1"></div>
        <div class="row" id="row-2"></div>
        <div class="row" id="row-3"></div>
    </div>

    <button id="mobile-button">
        <span class="big-lizard">🦎</span>
        <span>MLEM!</span>
        <span class="big-lizard">🦎</span>
    </button>

    <script>
        const jumpingLizard = document.getElementById('jumping-lizard');
        const mobileButton = document.getElementById('mobile-button');
        const soundFile = 'lizard.mp3';

        // Tastatur Definition (QWERTZ)
        const rows = [
            "QWERTZUIOP".split(""),
            "ASDFGHJKL".split(""),
            "YXCVBNM".split("")
        ];

        // Tastatur generieren
        rows.forEach((row, rowIndex) => {
            const rowElement = document.getElementById(`row-${rowIndex + 1}`);
            row.forEach(char => {
                const keyDiv = document.createElement('div');
                keyDiv.className = 'key';
                keyDiv.textContent = char;
                keyDiv.id = 'key-' + char.toLowerCase();
                rowElement.appendChild(keyDiv);
            });
        });

        function playMlem(targetKeyElement = null) {
            // Sound abspielen (überlagert)
            const sound = new Audio(soundFile);
            sound.play();

            // Wenn eine bestimmte Taste gedrückt wurde, springt der Lizard dorthin
            if (targetKeyElement) {
                const rect = targetKeyElement.getBoundingClientRect();
                jumpingLizard.style.display = 'block';
                jumpingLizard.style.left = (rect.left + rect.width / 2 - 15) + 'px';
                jumpingLizard.style.top = (rect.top - 30) + 'px';
                
                targetKeyElement.classList.add('active');
                setTimeout(() => targetKeyElement.classList.remove('active'), 100);
            }
        }

        // Event: Physische Tastatur
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const char = e.key.toLowerCase();
            const keyElement = document.getElementById('key-' + char);
            
            // Auch wenn die Taste nicht im Layout ist (z.B. Leertaste), Sound abspielen
            playMlem(keyElement);
        });

        // Event: Mobile Button
        mobileButton.addEventListener('mousedown', (e) => {
            e.preventDefault();
            playMlem();
            // Zufälliger Sprung für den Button
            jumpingLizard.style.display = 'block';
            jumpingLizard.style.left = (e.clientX - 15) + 'px';
            jumpingLizard.style.top = (e.clientY - 40) + 'px';
        });

        // Touch-Support für Handys fixen
        mobileButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playMlem();
        });

    </script>
</body>
</html>
